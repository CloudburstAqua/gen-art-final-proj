<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>a bizzare dream, 7/27/25</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
  <script>
    /* global nn */

    function setup () {
      const desc =
        `I was swimming down a rushing river and saw a large, long
      centipede in the water ahead of me. I tried to swim backwards
      to no avail and closed my eyes hoping to pass it. When I ope-
      -ned my eyes I saw another one on the other side of the stream 
      and I went unconscious again. When I came to, I looked at both
      of my forearms and saw red bumps and irregular spiny extrusions. 
      When I moved my arms, I felt pain inside of them. Inspecting 
      closer, I could see the bare traces of movement in my arms, and 
      made the grim realization that a centipede was wriggling under 
      the skin of each arm. To confirm, I asked my mom why I was experi-
      -encing pain, and she said the centipedes must have entered my 
      body and I'd have to pull them out. Looking closer at my right
      forearm, I saw the barest signs of the pincers poking out near 
      my wrist. I pinched the pincer with my fingers and tugged as 
      hard as I could, and the centipede came out of my body like a 
      ribbon -- all in an instant. Surprisingly, it didn't hurt, and
      my arm didn't start bleeding -- in fact, the skin remained intact.
      I repeated the same process with the centipede in my other arm. 
      It was the most relieving feeling ever. Pulling out the bugs made
      the bumps disappear from my arms. I don't remember the dream that
      came after that, but when I woke up, I was overjoyed by the sight
      of my regular, un-infested arms.`

      const keywords = ['rushing river', 'large, long centipede', 'red bumps', 'pincers',
        'poking', 'most relieving feeling', 'all in an instant',
        'skin intact', 'irregular spiny extrusions', 'red bumps',
        'like a ribbon'
      ]


      const lines = desc.trim().split('\n');
      let i = 0;
      let first_run = false

      function crazy () {
        const fps = 10000
        setTimeout(crazy, fps)

        const r = nn.random(100, 170)
        const g = nn.random(10)
        const b = nn.random(10)

        const color = nn.rgb(r, g, b)
        const size = nn.random(10, 40)

        const ran = nn.random(keywords)

        let div = document.createElement('div')
        div.classList.add('typewriter')

        div.style.marginLeft = nn.random(window.innerWidth * 0.7) + 'px'

        let para = document.createElement('p')
        para.textContent = ran

        para.style.color = color
        para.style.fontSize = `${size}px`

        div.appendChild(para)
        document.body.appendChild(div)

        const y = nn.get('body').scrollHeight
        window.scrollTo(0, y)
      }

      function print () {
        let div = document.createElement('div')
        let para = document.createElement('p')

        div.classList.add('typewriter')

        if (!first_run) {
          para.textContent = lines[i]
          i++

          if (i >= lines.length) {
            first_run = true
          }

        } else {
          const random_index = Math.floor(Math.random() * lines.length);
          para.textContent = lines[random_index]
          crazy()
        }

        div.appendChild(para)
        document.body.appendChild(div)

        const y = nn.get('body').scrollHeight
        window.scrollTo(0, y)
        setTimeout(print, 7000)
      }
      print()
      
      function resize () {
        canvas.resize(nn.width, document.body.scrollHeight)
      }
      
      function centipede () {
        nn.get('body')

        canvas = nn.create('canvas')
          .position(0, 0)
          .resize(nn.width, document.body.scrollHeight)
          .addTo('body')

        canvas.fillStyle = 'red'
        canvas.ctx.strokeStyle = 'rgba(255, 0, 0, 0.7)'
        canvas.style.position = 'absolute' // so I can modify it's exact position
        canvas.style.top = '0'
        canvas.style.left = '0'
        canvas.style.zIndex = '-1'
        canvas.style.pointerEvents = 'none'

        // setup perlin noise
        p = nn.perlin()
        p.seed()

        x = nn.width / 3
        y = nn.height / 2
        
      }

      function draw () {
        requestAnimationFrame(draw)
        
        resize() //NTS: makes sure that the canvas changes size as scrolling happens

        // makes old circles fade into background
        canvas.ctx.fillStyle = 'rgba(0,0,0,0.03)'
        canvas.ctx.fillRect(0, 0, nn.width, document.body.scrollHeight) 

        const t = performance.now() * 0.0008
        const cx = nn.width / 3
        const cy = window.scrollY + nn.height / 3
        const r = 300

        x = p.get(t, 0) * r + cx
        y = p.get(t, 100) * r + cy

        canvas.fillStyle = 'red'
        canvas.circle(x, y, 10)

        canvas.ctx.beginPath()
        canvas.ctx.moveTo(x, y)
        canvas.ctx.lineTo(x - 20, y + 20)
        canvas.ctx.stroke()

        canvas.ctx.beginPath()
        canvas.ctx.moveTo(x, y)
        canvas.ctx.lineTo(x + 20, y + 20)
        canvas.ctx.stroke()
        
      }

      centipede()
      resize()
      draw()
    }

    nn.on('load', setup)
  </script>
  <body>
  </body>
</html>
